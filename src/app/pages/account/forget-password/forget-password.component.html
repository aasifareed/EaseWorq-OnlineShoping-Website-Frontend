<app-breadcrumb [title]="'Forget Password'" [breadcrumb]="'Forget Password'"></app-breadcrumb>
<section class="pwd-page section-b-space">
    <div class="container">
        <div class="row">
            <div class="col-lg-6 offset-lg-3">
                <h2>Forget Your Password</h2>
                <form class="theme-form" [formGroup]="form" (ngSubmit)="submit()">
                    <div class="row">
                        <div class="col-md-12">
                            <input type="email" class="form-control" id="email" formControlName="email"
                                   placeholder="Enter Your Email">
                            <small class="text-danger" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
                                Enter a valid email.
                            </small>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-solid mt-3" [disabled]="loading">
                        {{ loading ? 'Sending…' : 'Submit' }}
                    </button>
                    <div class="mt-3">
                        <a [routerLink]="['/pages/login']">Back to login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
