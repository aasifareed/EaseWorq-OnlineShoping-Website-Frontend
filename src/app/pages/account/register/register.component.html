<app-breadcrumb [title]="'Register'" [breadcrumb]="'Register'"></app-breadcrumb>
<section class="register-page section-b-space">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <h3>create account</h3>
                <div class="theme-card">
                    <form class="theme-form" [formGroup]="registerForm" (ngSubmit)="submit()">
                        <div class="row">
                            <div class="col-md-6">
                                <label for="fname">First Name</label>
                                <input type="text" class="form-control" id="fname" formControlName="firstName"
                                       placeholder="First Name">
                            </div>
                            <div class="col-md-6">
                                <label for="lname">Last Name</label>
                                <input type="text" class="form-control" id="lname" formControlName="lastName"
                                       placeholder="Last Name">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <label for="email">email</label>
                                <input type="email" class="form-control" id="email" formControlName="email"
                                       placeholder="Email">
                            </div>
                            <div class="col-md-6">
                                <label for="phone">Phone (optional)</label>
                                <input type="text" class="form-control" id="phone" formControlName="phone"
                                       placeholder="Phone">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <label for="password">Password</label>
                                <input type="password" class="form-control" id="password" formControlName="password"
                                       placeholder="Enter your password" autocomplete="new-password">
                            </div>
                            <div class="col-md-6">
                                <label for="confirmPassword">Confirm Password</label>
                                <input type="password" class="form-control" id="confirmPassword" formControlName="confirmPassword"
                                       placeholder="Confirm password" autocomplete="new-password">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12">
                                <label for="address">Address</label>
                                <div class="address-autocomplete-wrap">
                                    <input type="text" class="form-control" id="address" formControlName="address"
                                           placeholder="Street address" autocomplete="off"
                                           (keydown)="handleKeyDown($event, 'address')"
                                           (blur)="onAutocompleteBlur('address')">
                                    <ul class="google-address-suggestions"
                                        *ngIf="activeAutocompleteField === 'address' && (googleAddressService.suggestions$ | async)?.length">
                                        <li *ngFor="let suggestion of googleAddressService.suggestions$ | async; let i = index"
                                            (mousedown)="$event.preventDefault()"
                                            (click)="onPlaceSelected(suggestion, 'address')"
                                            [class.highlighted]="i === highlightedIndex">
                                            {{ suggestion.description }}
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <label for="town">Town/City</label>
                                <div class="address-autocomplete-wrap">
                                    <input type="text" class="form-control" id="town" formControlName="town"
                                           placeholder="Town/City" autocomplete="off"
                                           (keydown)="handleKeyDown($event, 'town')"
                                           (blur)="onAutocompleteBlur('town')">
                                    <ul class="google-address-suggestions"
                                        *ngIf="activeAutocompleteField === 'town' && (googleAddressService.suggestions$ | async)?.length">
                                        <li *ngFor="let suggestion of googleAddressService.suggestions$ | async; let i = index"
                                            (mousedown)="$event.preventDefault()"
                                            (click)="onPlaceSelected(suggestion, 'town')"
                                            [class.highlighted]="i === highlightedIndex">
                                            {{ suggestion.description }}
                                        </li>
                                    </ul>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="state">State / County</label>
                                <div class="address-autocomplete-wrap">
                                    <input type="text" class="form-control" id="state" formControlName="state"
                                           placeholder="State / County" autocomplete="off"
                                           (keydown)="handleKeyDown($event, 'state')"
                                           (blur)="onAutocompleteBlur('state')">
                                    <ul class="google-address-suggestions"
                                        *ngIf="activeAutocompleteField === 'state' && (googleAddressService.suggestions$ | async)?.length">
                                        <li *ngFor="let suggestion of googleAddressService.suggestions$ | async; let i = index"
                                            (mousedown)="$event.preventDefault()"
                                            (click)="onPlaceSelected(suggestion, 'state')"
                                            [class.highlighted]="i === highlightedIndex">
                                            {{ suggestion.description }}
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <label for="postalcode">Postal Code</label>
                                <input type="text" class="form-control" id="postalcode" formControlName="postalcode"
                                       placeholder="Postal Code">
                            </div>
                        </div>
                        <small class="text-danger d-block mb-2" *ngIf="registerForm.errors?.['mismatch'] && registerForm.touched">
                            Passwords do not match.
                        </small>
                        <button type="submit" class="btn btn-solid" [disabled]="loading">
                            {{ loading ? 'Creating…' : 'create Account' }}
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
