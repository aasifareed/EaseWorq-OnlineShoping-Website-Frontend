<app-breadcrumb [title]="'Login'" [breadcrumb]="'Login'"></app-breadcrumb>
<!-- section start -->
<section class="login-page section-b-space">
    <div class="container">
        <div class="row">
            <div class="col-lg-6">
                <h3>Login</h3>
                <div class="theme-card">
                    <form class="theme-form" [formGroup]="loginForm" (ngSubmit)="submit()">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" class="form-control" id="email" formControlName="email"
                                   placeholder="Email" autocomplete="username">
                            <small class="text-danger" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
                                Enter a valid email.
                            </small>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" class="form-control" id="password" formControlName="password"
                                   placeholder="Enter your password" autocomplete="current-password">
                            <small class="text-danger" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
                                Password is required (min 6 characters).
                            </small>
                        </div>
                        <div class="form-group mb-3">
                            <a [routerLink]="['/pages/forget/password']">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-solid" [disabled]="loading">
                            {{ loading ? 'Signing in…' : 'Login' }}
                        </button>
                    </form>
                </div>
            </div>
            <div class="col-lg-6 right-login">
                <h3>New Customer</h3>
                <div class="theme-card authentication-right">
                    <h6 class="title-font">Create A Account</h6>
                    <p>Sign up for a free account at our store. Registration is quick and easy. It allows you to be able to order from our shop. To start shopping click register.</p>
                    <a class="btn btn-solid" [routerLink]="['/pages/register']">Create an Account</a>
                </div>
            </div>
        </div>
    </div>
</section>
<!--Section ends-->
