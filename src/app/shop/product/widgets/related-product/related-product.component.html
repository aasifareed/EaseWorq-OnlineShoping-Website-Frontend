<!-- product section start -->
<section class="section-b-space">
    <div class="container">
        <div class="row">
            <div class="col-12 product-related">
                <h2>Related Products</h2>
            </div>
        </div>
        <div class="row search-product" *ngIf="loading">
            <div class="col-12 text-center py-4">Loading related products…</div>
        </div>
        <div class="row search-product" *ngIf="!loading && displayProducts.length">
            <div class="col-xl-3 col-md-6 col-sm-6" *ngFor="let product of displayProducts">
                <div class="product-box">
                   <app-product-box-one 
	                  [product]="product" 
	                  [currency]="productService?.Currency"
	                  [cartModal]="true">
	                </app-product-box-one>
                </div>
            </div>
        </div>
        <div class="row" *ngIf="!loading && !displayProducts.length">
            <div class="col-12 text-center py-3 text-muted">No related products found.</div>
        </div>
    </div>
</section>
<!-- product section end -->
