<div class="collection-collapse-block border-0" [class.open]="collapse">
  <h3 class="collapse-block-title" (click)="collapse = !collapse">Price (USD)</h3>
  <div class="collection-collapse-block-content">
    <div class="collection-brand-filter">

      <!-- Min / Max inputs -->
      <div class="d-flex align-items-center gap-2 mt-2 mb-2">
        <input type="number" class="price-input" [(ngModel)]="localMin" (change)="appliedFilter()" [min]="options.floor" [max]="localMax ?? options.ceil" />
        <span class="text-secondary small">TO</span>
        <input type="number" class="price-input" [(ngModel)]="localMax" (change)="appliedFilter()" [min]="localMin ?? options.floor" [max]="options.ceil" />
      </div>

      <!-- Slider -->
      <!-- <ngx-slider
        [(value)]="min"
        [(highValue)]="max"
        [options]="options"
        (userChangeEnd)="appliedFilter($event)"
        *ngIf="isBrowser">
      </ngx-slider> -->

    </div>
  </div>
</div>
