<!-- section start -->
<section class="section-b-space shop-layout-microless">
    <div class="collection-wrapper">
        <div class="container-fluid">
        <!-- <div class="container"> -->
            <div class="row">
                <div class="col-lg-3">
                    <div class="collection-filter shop-sidebar-microless" [class.openFilterbar]="mobileSidebar">
                        <!-- side-bar colleps block stat -->
                        <div class="collection-filter-block">
                            <div class="collection-mobile-back" (click)="toggleMobileSidebar()">
                                <span class="filter-back">
                                    <i class="fa fa-angle-left" aria-hidden="true"></i> back
                                </span>
                            </div>
                            <!-- Category filter start -->
                            <app-categories></app-categories>
                        </div>

                            <div class="collection-collapse-block" [class.open]="deliveryOpen">
                                <h3 class="collapse-block-title" (click)="deliveryOpen = !deliveryOpen">Delivery Day</h3>
                                <div class="collection-collapse-block-content">
                                    <div class="collection-brand-filter microless-checkbox-list">
                                        <div class="custom-control custom-checkbox collection-filter-checkbox">
                                            <input type="checkbox" class="custom-control-input" id="ml-dd-today"
                                                [(ngModel)]="deliveryToday" disabled>
                                            <label class="custom-control-label" for="ml-dd-today">Today <span class="microless-filter-count">(0)</span></label>
                                        </div>
                                        <div class="custom-control custom-checkbox collection-filter-checkbox">
                                            <input type="checkbox" class="custom-control-input" id="ml-dd-tomorrow"
                                                [(ngModel)]="deliveryTomorrow" disabled>
                                            <label class="custom-control-label" for="ml-dd-tomorrow">Tomorrow <span class="microless-filter-count">(0)</span></label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div> -->
                        <!-- silde-bar colleps block end here -->
                        <!-- side-bar colleps block stat -->
                        <div class="collection-filter-block microless-filter-section">
                            <!-- brand filter start -->
                            <app-brands [categoryTree]="categoryTree" [selectedBrandIds]="brands" (brandOptionsReady)="brandOptions = $event">
                            </app-brands>
                            <app-colors [categoryTree]="categoryTree" [selectedColors]="colors">
                            </app-colors>
                            <app-size [categoryTree]="categoryTree" [selectedSizes]="size">
                            </app-size>
                            <!-- price filter start here -->
                            <app-price [min]="minPrice" [max]="maxPrice" (priceFilter)="updateFilter($event)">
                            </app-price>
                            <div class="microless-inline-filters">
                                <label class="microless-stock-option" for="ml-out-stock">
                                    <input type="checkbox"
                                        class="microless-stock-option__input"
                                        id="ml-out-stock"
                                        [(ngModel)]="includeOutOfStock"
                                        (change)="onIncludeOutOfStockChange()">
                                    <span class="microless-stock-option__text">Include Out of Stock</span>
                                </label>
                                <!-- <div class="custom-control custom-checkbox collection-filter-checkbox">
                                    <input type="checkbox" class="custom-control-input" id="ml-fulfilled"
                                        [(ngModel)]="fulfilledByShop">
                                    <label class="custom-control-label" for="ml-fulfilled">Fulfilled by Microless</label>
                                </div> -->
                            </div>
                        </div>
                        <!-- silde-bar colleps block end here -->
                        <!-- side-bar single product slider start -->
                        <!-- <app-product-box-vertical-slider [title]="'New Products'">
                        </app-product-box-vertical-slider> -->
                        <!-- side-bar single product slider end -->
                        <!-- side-bar banner start here -->
                        <!-- <div class="collection-sidebar-banner">
                            <a [routerLink]="['/shop/collection/left/sidebar']">
                                <img src="assets/images/collection-sidebar-banner.png" class="img-fluid" alt="banner">
                            </a>
                        </div> -->
                        <!-- side-bar banner end here -->
                    </div>
                </div>
                <div class="collection-content col">
                    <div class="page-main-content">
                        <div class="row">
                            <div class="col-sm-12">
                                <div class="top-banner-wrapper">
                                    <!-- <a [routerLink]="['/shop/collection/left/sidebar']">
                                        <img src="assets/images/collection-banner.jpg" class="img-fluid " alt="">
                                    </a> -->
                                    <div class="top-banner-content microless-page-heading">
                                        <h1 class="collection-page-title mt-3">{{ pageTitle }}</h1>
                                        <!-- <h5>Lorem Ipsum is simply dummy text of the printing and typesetting industry.
                                        </h5>
                                        <p>
                                            Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since the 1500s, when an unknown printer took a galley of type and scrambled it to make a type specimen book. It has
                                            survived not only five centuries, but also the leap into electronic typesetting, remaining essentially unchanged. It was popularised in the 1960s with the release of Letraset sheets containing Lorem Ipsum passages,
                                            and more recently with desktop publishing software like Aldus PageMaker including versions of Lorem Ipsum.
                                        </p> -->
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-xl-12">
                                        <div class="filter-main-btn" (click)="toggleMobileSidebar()">
                                            <span class="filter-btn btn btn-theme">
                                                <i class="fa fa-filter" aria-hidden="true"></i> Filter
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                <ul class="product-filter-tags">
                                    <li class="me-1" *ngFor="let tag of tags">
                                        <a href="javascript:void(0)" class="filter_tag">
                                            {{ tagLabel(tag) }} <i class="ti-close" (click)="removeTag(tag); $event.preventDefault()"></i>
                                        </a>
                                    </li>
                                    <li class="clear_filter" *ngIf="tags.length > 0">
                                        <a href="javascript:void(0)" class="clear_filter" (click)="removeAllTags()">
                                            Clear all
                                        </a>
                                    </li>
                                </ul>
                                <div class="collection-product-wrapper collection--microless" id="products" *ngIf="products.length > 0&& !loader">
                                    <app-grid [products]="products" [paginate]="paginate" [pageSize]="pageSize" [TotalCount]="TotalCount" [layoutView]="layoutView" [sortBy]="sortBy" [breadcrumbTrail]="breadcrumbTrail" (setGrid)="updateGridLayout($event)" (setLayout)="updateLayoutView($event)" (sortedBy)="sortByFilter($event)">
                                    </app-grid>
                                    <div class="product-wrapper-grid" [ngClass]="layoutView">
                                        <div class="row" [class.g-0]="layoutView === 'list-view'">
                                            <div class="col-grid-box" [ngClass]="grid" *ngFor="let product of products">
                                                <div class="product-box" [class.product-box--list]="layoutView === 'list-view'">
                                                    <app-product-box-one
                                                      [product]="product"
                                                      [currency]="productService?.Currency"
                                                      [thumbnail]="false"
                                                      [cartModal]="true"
                                                      [loader]="true"
                                                      [listMode]="layoutView === 'list-view'">
                                                    </app-product-box-one>
                                                </div>
                                            </div>
                                            <div class="col-sm-12 text-center section-b-space mt-5 no-found" *ngIf="!products.length">
                                                <img src="assets/images/empty-search.jpg" class="img-fluid mb-4">
                                                <h3>Sorry! Couldn't find the product you were looking For!!! </h3>
                                                <p>Please check if you have misspelt something or try searching with other words.</p>
                                                <a [routerLink]="['/shop/collection/left/sidebar']" class="btn btn-solid">continue shopping</a>
                                            </div>
                                        </div>
                                    </div>
                                    <app-pagination [paginate]="paginate" [pageSize]="pageSize" [products]="products" [paginate]="paginate" (setPage)="setPage($event)">
                                    </app-pagination>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<!-- section End -->
