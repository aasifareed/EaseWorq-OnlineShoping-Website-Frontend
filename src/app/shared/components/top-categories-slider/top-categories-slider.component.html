<section class="py-4">
  <div class="container-fluid px-3">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="title-border" *ngIf="!gridMode" style="border-left:4px solid #f5b800;">{{ sectionTitle }}</h2>
      <h3 class="title-border" [class.text-center]="gridMode" *ngIf="gridMode">{{ sectionTitle }}</h3>
    </div>

    <p *ngIf="loading" class="text-center py-3 mb-0">Loading categories…</p>

    <owl-carousel-o [options]="categorySliderConfig" *ngIf="!gridMode && !loading && categories.length">
      <ng-container *ngFor="let category of categories">
        <ng-template carouselSlide>
          <a
            [routerLink]="['/shop/collection/left/sidebar']"
            [queryParams]="{ category: category.id }"
            class="top-category-card d-block text-decoration-none text-center">
            <div class="top-category-img">
              <img [src]="category.image" [alt]="category.name" class="img-fluid" />
            </div>
            <div class="top-category-title mt-2">
              <span>{{ category.name }}</span>
            </div>
          </a>
        </ng-template>
      </ng-container>
    </owl-carousel-o>

    <div class="row g-3" *ngIf="gridMode && !loading && categories.length">
      <div class="col-6 col-md-4 col-lg-3" *ngFor="let category of categories">
        <a
          [routerLink]="['/shop/collection/left/sidebar']"
          [queryParams]="{ category: category.id }"
          class="top-category-card d-block text-decoration-none text-center">
          <div class="top-category-img">
            <img [src]="category.image" [alt]="category.name" class="img-fluid" />
          </div>
          <div class="top-category-title mt-2">
            <span>{{ category.name }}</span>
          </div>
        </a>
      </div>
    </div>

  </div>
</section>
