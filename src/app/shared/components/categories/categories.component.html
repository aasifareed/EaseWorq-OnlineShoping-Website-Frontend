<div class="collection-collapse-block border-0" [class.open]="collapse">
    <h3 class="collapse-block-title" (click)="collapse = !collapse">Category</h3>
    <div class="collection-collapse-block-content">
        <div class="collection-brand-filter">
            <ul class="category-list">
                <li *ngFor="let cat of category ">
                <!-- <li *ngFor="let cat of filterbyCategory"> -->

                    <!-- Level 1 -->
                    <a [routerLink]="['/shop/collection/left/sidebar']" [queryParams]="{ category: cat.id }"
                        [class.active]="activeSlug === cat.id">
                        {{ cat.title }}
                        <span *ngIf="cat.count">({{ cat.count }})</span>
                    </a>

                    <!-- Level 2 -->
                    <ul *ngIf="isOpen(cat) && cat.children?.length">
                        <li *ngFor="let child of cat.children">

                            <a [routerLink]="['/shop/collection/left/sidebar']"
                                [queryParams]="{ category: child.id }" [class.active]="activeSlug === child.id">
                                {{ child.title }}
                                <span *ngIf="child.count">({{ child.count }})</span>
                            </a>

                            <!-- Level 3 -->
                            <ul *ngIf="isOpen(child) && child.children?.length">
                                <li *ngFor="let grand of child.children">
                                    <a [routerLink]="['/shop/collection/left/sidebar']"
                                        [queryParams]="{ category: grand.title }"
                                        [class.active]="activeSlug === grand.title">
                                        {{ grand.title }}
                                        <span *ngIf="grand.count">({{ grand.count }})</span>
                                    </a>
                                </li>
                            </ul>

                        </li>
                    </ul>

                </li>
            </ul>
        </div>
    </div>
</div>

<!-- End Categories List -->
