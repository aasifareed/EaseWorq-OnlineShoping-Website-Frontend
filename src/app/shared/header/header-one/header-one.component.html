  <div class="ml-top-header" *ngIf="topbar">
    <div class="container-fluid">
      <div class="ml-top-utilities">
        <div class="ml-utility-toggle">
          <label class="ml-theme-switch" for="headerDarkCheck" aria-label="Toggle dark mode">
            <input type="checkbox"
                   id="headerDarkCheck"
                   class="ml-theme-switch__input"
                   [checked]="isDarkMode"
                   (change)="onThemeToggle($event)">
            <span class="ml-theme-switch__track">
              <i class="fa fa-sun-o"></i>
              <i class="fa fa-moon-o"></i>
            </span>
          </label>
        </div>

        <span class="ml-utility-meta" *ngIf="currencyLabel" title="Store currency">
          <i class="fa fa-money" aria-hidden="true"></i>
          {{ currencyLabel }}
        </span>

        <span class="ml-utility-meta" title="Store language">
          <i class="fa fa-globe" aria-hidden="true"></i>
          English
        </span>
      </div>
    </div>
  </div>

  <div class="main-header-microless">
    <div class="container-fluid">
      <div class="row align-items-center gx-0">
        <div class="col-auto">
          <div class="brand-logo py-2">
            <a [routerLink]="['/home/fashion']" class="text-decoration-none">
              <span class="logo-main">{{ storeName }}</span>
            </a>
          </div>
        </div>

        <div class="col px-lg-5">
          <div class="search-wrapper d-flex">
            <input type="text" class="form-control" placeholder="What are you looking for?">
            <button class="btn btn-warning">
              <i class="fa fa-search"></i>
            </button>
          </div>
        </div>

        <div class="col-auto">
          <div class="d-flex align-items-center action-icons">
            <div class="dropdown px-3 text-center border-end border-secondary-subtle">
              <a class="text-decoration-none dropdown-toggle no-caret header-action-link" data-bs-toggle="dropdown">
                <span *ngIf="isLoggedIn" class="account-initials">{{ userInitials }}</span>
                <i *ngIf="!isLoggedIn" class="fa fa-user-o fs-5"></i>
                <span class="d-block label">YOUR ACCOUNT</span>
              </a>
              <ul class="dropdown-menu shadow-lg" [class.dropdown-menu-dark]="isDarkMode">
                <ng-container *ngIf="!isLoggedIn">
                  <li><a class="dropdown-item" [routerLink]="['/pages/login']">Log In</a></li>
                  <li><a class="dropdown-item" [routerLink]="['/pages/register']">Sign Up</a></li>
                </ng-container>
                <ng-container *ngIf="isLoggedIn">
                  <li><a class="dropdown-item" [routerLink]="['/pages/my-orders']">My Orders</a></li>
                  <li><hr class="dropdown-divider"></li>
                  <li><button type="button" class="dropdown-item" (click)="logout()">Log Out</button></li>
                </ng-container>
              </ul>
            </div>

            <div  [routerLink]="['/shop/wishlist']" class="px-3 text-center border-end border-secondary-subtle pointer">
              <i class="fa fa-heart-o fs-5 header-action-icon"></i>
              <span class="d-block label header-action-label">WISHLIST</span>
            </div>

            <a class="px-3 text-center header-cart-link text-decoration-none" [routerLink]="['/shop/cart']"
              aria-label="View shopping cart">
              <span class="header-cart-icon-wrap">
                <i class="fa fa-shopping-cart fs-5 header-action-icon" aria-hidden="true"></i>
                <ng-container *ngIf="cartCount$ | async as count">
                  <span class="header-cart-badge" *ngIf="count > 0">{{ count > 99 ? '99+' : count }}</span>
                </ng-container>
              </span>
              <span class="d-block label header-action-label">YOUR CART</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="bg-warning navigation-bar">
    <div class="container-fluid d-flex align-items-center h-100" >
      <div class="all-cat-wrapper" (mouseenter)="openMenu()" (mouseleave)="closeMenu()">
        <div class="all-cat-btn px-4 h-100 d-flex align-items-center border-end border-dark">
        <i class="fa fa-bars me-2"></i> ALL CATEGORIES
      </div>

      <!-- paanel code  -->
      <!-- paanel code  -->

      <!-- Dropdown Panel -->
      <div class="all-cat-dropdown" [class.open]="isOpen">

        <!-- Left: Main category list -->
        <ul class="cat-main-list">
          <li *ngFor="let cat of categories" (mouseenter)="setActive(cat)" [class.active]="activeCat?.id === cat.id">
            <a [routerLink]="['/shop/collection/left/sidebar']" [queryParams]="{ category: cat.id }"
              class="cat-main-link">
              {{ cat.title }}
              <i class="fa fa-angle-right ms-auto" *ngIf="cat.children?.length"></i>
            </a>
          </li>
        </ul>

        <!-- Right: Sub-categories panel -->
        <div class="cat-sub-panel" *ngIf="activeCat?.children?.length">
          <ul class="cat-sub-list">
            <li *ngFor="let child of activeCat.children">
              <a [routerLink]="['/shop/collection/left/sidebar']" [queryParams]="{ category: child.id }"
                class="cat-sub-link">
                {{ child.title }}
              </a>
            </li>
          </ul>
        </div>

      </div>

      <!-- paanel code  -->
      <!-- paanel code  -->
      </div>
      
      <div class="flex-grow-1 ps-2">
        <app-menu></app-menu>
      </div>

      <a [routerLink]="['/pages/my-orders']" class="nav-orders-link ms-auto px-4 text-dark fw-bold text-decoration-none">
        ORDERS
      </a>
    </div>
  </div>
</header>
<div class="microless-header-spacer" *ngIf="sticky" aria-hidden="true"></div>
