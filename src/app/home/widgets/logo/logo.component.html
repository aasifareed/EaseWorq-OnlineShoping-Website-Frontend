<owl-carousel-o [options]="LogoSliderConfig" class="no-arrow">
  <ng-container *ngFor="let logo of logos">
    <ng-template carouselSlide>
      <div class="product-image">
        <a [routerLink]="'/home/fashion'">
          <img [src]="logo.image" alt="logo" />
        </a>
      </div>
    </ng-template>
  </ng-container>
</owl-carousel-o>
