<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>MultiKart Ecommerce Angular 15 | Angular Ecommerce Template</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	<!--Google font-->
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700,900" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="ltr">
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('shop_theme');
          if (theme !== 'light') {
            document.body.classList.add('dark');
          }
        } catch (e) {
          document.body.classList.add('dark');
        }
      })();
    </script>
    <div id="storefront-bootstrap-loader" class="storefront-bootstrap-loader" aria-live="polite" aria-busy="true">
      <div class="storefront-bootstrap-loader__spinner"></div>
      <p class="storefront-bootstrap-loader__text">Loading store…</p>
    </div>
    <style>
      .storefront-bootstrap-loader {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #fff;
        color: #333;
      }
      .storefront-bootstrap-loader__spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e8e8e8;
        border-top-color: #ff4c3b;
        border-radius: 50%;
        animation: storefront-bootstrap-spin 0.8s linear infinite;
      }
      .storefront-bootstrap-loader__text {
        margin: 0;
        font-family: Lato, sans-serif;
        font-size: 0.95rem;
        letter-spacing: 0.02em;
      }
      @keyframes storefront-bootstrap-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <app-root></app-root>
    <script src="https://checkout.stripe.com/checkout.js"></script>
    <!-- facebook chat section start -->
	<div id="fb-root"></div>
	<script>
	  (function(d, s, id) {
	    var js, fjs = d.getElementsByTagName(s)[0];
	    if (d.getElementById(id)) return;
	    js = d.createElement(s);
	    js.id = id;
	    js.src = 'https://connect.facebook.net/en_US/sdk/xfbml.customerchat.js#xfbml=1&version=v2.12&autoLogAppEvents=1';
	    fjs.parentNode.insertBefore(js, fjs);
	  }(document, 'script', 'facebook-jssdk'));
	</script>

	<!-- Your customer chat code -->
	<div id="fb-chat" class="fb-customerchat" attribution=setup_tool page_id="2123438804574660" theme_color="#ff4c3b" logged_in_greeting="Hi! Welcome to PixelStrap Themes  How can we help you?" logged_out_greeting="Hi! Welcome to PixelStrap Themes  How can we help you?">
	</div>
	<!-- facebook chat section end -->
	 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
